<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Observatory</title>
    
    <style>
        /* Radikaler Minimalismus mit modern-sachlicher Typografie */
        body {
            /* Wechsel von Georgia zu einem klaren, technischen Schriftbild */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px; 
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #fdfdfd;
            
            max-width: 1200px; 
            margin: 0 auto;
            /* Padding oben von 60px auf 20px reduziert */
            padding: 20px 5vw 60px 5vw; 
        }

        /* Verhindert zu viel Leerraum vor der ersten Überschrift */
        h1:first-child {
            margin-top: 0.5em;
        }

        /* Überschriften: Schlichte Marker im Text */
        h1, h2, h3 {
            color: #8a6d3b;
            margin-top: 1.5em;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        /* Bilder: Primärer Informationsträger */
        img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 2.5em auto;
            cursor: zoom-in;
            border-radius: 4px;
        }

        /* Die Galerie als funktionales Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 3em;
        }
        
        .gallery .img-container {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #eee;
            border-radius: 6px;
        }
        
        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            margin: 0;
        }

        /* Links: Minimaler Akzent */
        a {
            color: #2a5d8f;
            text-decoration: underline;
        }

        footer {
            margin-top: 80px;
            padding-bottom: 50px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 0.8em;
            color: #aaa;
            text-align: left;
        }
    </style>
</head>
<body>

    {{ content }}

    {% include footer.html %}

</body>
</html>
